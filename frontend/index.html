<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cricket Insight Automator</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
</head>
<body>

<!-- ambient glow layer -->
<div id="bg-glow"></div>

<div id="root">

  <!-- ══ HERO ════════════════════════════════════════ -->
  <header class="hero">
    <div class="hero-eyebrow">Powered by Cricbuzz API</div>
    <h1>Cricket Insight<br>Automator</h1>
    <p class="hero-sub">Real-time IPL Intelligence · Scorecard · Commentary · Analytics</p>
  </header>

  <!-- ══ FORM ════════════════════════════════════════ -->
  <div class="form-card">
    <div class="form-row">

      <div class="field">
        <label>Team 1</label>
        <select id="team1Select"></select>
      </div>

      <div class="field">
        <label>Team 2</label>
        <select id="team2Select"></select>
      </div>

      <div class="field">
        <label>IPL Year</label>
        <input type="number" id="yearInput" value="2026" min="2008" max="2030"/>
      </div>

      <button class="btn-search" id="searchBtn">SEARCH</button>

    </div>
  </div>

  <!-- ══ CLASH BANNER ════════════════════════════════ -->
  <div class="clash-banner" id="clashBanner">
    <div class="team-side t1">
      <div class="ts-emoji" id="cb-emoji1">🏏</div>
      <div class="ts-code"  id="cb-code1">T1</div>
      <div class="ts-name"  id="cb-name1">Team One</div>
    </div>
    <div class="vs-chip">VS</div>
    <div class="team-side t2">
      <div class="ts-emoji" id="cb-emoji2">🏏</div>
      <div class="ts-code"  id="cb-code2">T2</div>
      <div class="ts-name"  id="cb-name2">Team Two</div>
    </div>
  </div>

  <!-- ══ STATUS / ERROR ══════════════════════════════ -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Searching…</span>
  </div>
  <div class="error-box" id="errorBox"></div>

  <!-- ══ TABS ════════════════════════════════════════ -->
  <div class="tabs-wrap" id="tabsWrap">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn" data-tab="overview">📊 Overview</button>
      <button class="tab-btn" data-tab="batting">🏏 Batting</button>
      <button class="tab-btn" data-tab="bowling">🎯 Bowling</button>
      <button class="tab-btn" data-tab="fow">📉 Fall of Wickets</button>
      <button class="tab-btn" data-tab="partnerships">🤝 Partnerships</button>
      <button class="tab-btn" data-tab="xi">👕 Playing XI</button>
      <button class="tab-btn" data-tab="awards">🏆 Awards</button>
      <button class="tab-btn" data-tab="commentary">🎙️ Commentary</button>
    </div>
  </div>

  <!-- ══ PANELS ══════════════════════════════════════ -->
  <div id="panel-overview"     class="panel"></div>
  <div id="panel-batting"      class="panel"></div>
  <div id="panel-bowling"      class="panel"></div>
  <div id="panel-fow"          class="panel"></div>
  <div id="panel-partnerships" class="panel"></div>
  <div id="panel-xi"           class="panel"></div>
  <div id="panel-awards"       class="panel"></div>
  <div id="panel-commentary"   class="panel"></div>

</div><!-- #root -->

<script src="js/app.js"></script>
</body>
</html>
